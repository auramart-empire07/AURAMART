<!DOCTYPE html>
<html>
<head>
  <title>AURAMART</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0B0B0B;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(18,18,18,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 2px;
    }

    .nav-links span {
      margin-left: 25px;
      cursor: pointer;
      color: #B3B3B3;
    }

    .nav-links span:hover {
      color: #fff;
    }

    /* HERO */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #0B0B0B, #1A1A1A);
    }

    .hero h1 {
      font-size: 52px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero p {
      color: #B3B3B3;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(135deg, #5A0FC8, #7B2BFF);
      padding: 14px 30px;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* CATEGORY SECTION */
    .section {
      padding: 60px 40px;
    }

    .section h2 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #121212;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
      border: 1px solid #1F1F1F;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #5A0FC8;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 30px;
      background: #121212;
      color: #808080;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">AURAMART</div>
  <div class="nav-links">
    <span>Home</span>
    <span>Shop</span>
    <span>Categories</span>
    <span>Cart</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>The Future of Shopping</h1>
  <p>Luxury. Speed. Everything in one place.</p>
  <a href="#" class="btn">Explore Now</a>
</div>

<!-- CATEGORIES -->
<div class="section">
  <h2>Categories</h2>
  <div class="grid">
    <div class="card">Electronics</div>
    <div class="card">Fashion</div>
    <div class="card">Groceries</div>
    <div class="card">Cosmetics</div>
    <div class="card">Sports</div>
    <div class="card">Daily Essentials</div>
  </div>
</div>

<!-- TRENDING -->
<div class="section">
  <h2>Trending Products</h2>
  <div class="grid">
    <div class="card">iPhone</div>
    <div class="card">Sneakers</div>
    <div class="card">Perfume</div>
    <div class="card">Smartwatch</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 AURAMART. All rights reserved.
</div>

</body>
</html>
